[alembic]
prepend_sys_path = .
# Path to migration scripts. Use forward slashes for portability.
script_location = alembic

# Template used to generate migration file names.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for timestamps within migration filenames.
timezone = UTC

# Max length of characters to apply to the "slug" field.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file.
sourceless = false

# Version path separator.
version_path_separator = os

# The actual DB URL is injected at runtime in env.py from app settings,
# this placeholder is only used as a fallback / for `alembic` CLI display.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Uncomment to auto-format generated migrations with black:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

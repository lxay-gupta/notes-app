version: "1"

services:
  # ── FastAPI Web Service ───────────────────────────────────────────────────
  - type: web
    name: notes-api
    runtime: python
    region: oregon          # change to: frankfurt, singapore, ohio as needed
    plan: starter           # starter ($7/mo) | standard ($25/mo)

    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1

    healthCheckPath: /health

    envVars:
      # ── App ──
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1

      # ── Security ── (set via Render dashboard / secret env groups)
      - key: SECRET_KEY
        generateValue: true     # Render generates a random value on first deploy
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"

      # ── Database ── (injected by the Render PostgreSQL service below)
      - key: DATABASE_URL
        fromDatabase:
          name: notes-db
          property: connectionString

      # ── Redis ── (injected by the Render Redis service below)
      - key: REDIS_URL
        fromService:
          name: notes-redis
          type: redis
          property: connectionString

      # ── CORS ── (comma-separated list — update with your frontend URL)
      - key: BACKEND_CORS_ORIGINS
        value: ""

      # ── File uploads ──
      - key: UPLOAD_DIR
        value: /tmp/uploads   # Render free-tier has ephemeral filesystem
      - key: MAX_UPLOAD_BYTES
        value: "5242880"

      # ── Cache TTLs ──
      - key: CACHE_TTL_NOTES_LIST
        value: "60"
      - key: CACHE_TTL_SEARCH
        value: "30"
      - key: CACHE_TTL_USER_PROFILE
        value: "300"

      # ── Rate limits ──
      - key: RATE_LIMIT_LOGIN_MAX
        value: "10"
      - key: RATE_LIMIT_LOGIN_WINDOW
        value: "60"
      - key: RATE_LIMIT_REGISTER_MAX
        value: "5"
      - key: RATE_LIMIT_REGISTER_WINDOW
        value: "60"

      # ── Logging ──
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_DIR
        value: /tmp/logs
      - key: LOG_FILE
        value: app.log

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  - type: pserv           # managed Postgres
    name: notes-db
    runtime: postgres
    region: oregon
    plan: starter         # starter ($7/mo) — first 90 days free on Render
    databaseName: notes_db
    user: notes_user

  # ── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: notes-redis
    region: oregon
    plan: starter         # starter ($10/mo) — free tier available
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []       # empty = only services in the same Render account

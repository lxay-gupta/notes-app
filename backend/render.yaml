version: "1"

services:
  - type: web
    name: notes-api
    runtime: python
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: DATABASE_URL
        fromDatabase:
          name: notes-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: notes-redis
          type: redis
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        value: ""
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: MAX_UPLOAD_BYTES
        value: "5242880"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_DIR
        value: /tmp/logs
      - key: LOG_FILE
        value: app.log

  - type: redis
    name: notes-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all

databases:
  - name: notes-db
    region: oregon
    plan: starter
